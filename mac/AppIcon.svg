<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="120" x2="904" y2="904">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>

    <linearGradient id="ring" x1="350" y1="300" x2="700" y2="720">
      <stop offset="0%" stop-color="#F2EEE7"/>
      <stop offset="100%" stop-color="#CFC8BE"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect
    x="96"
    y="96"
    width="832"
    height="832"
    rx="190"
    fill="url(#bg)"
    filter="url(#shadow)"
  />

  <!-- Subtle border -->
  <rect
    x="98"
    y="98"
    width="828"
    height="828"
    rx="188"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="4"
  />

  <!-- Steward ring -->
  <circle
    cx="512"
    cy="512"
    r="185"
    fill="none"
    stroke="url(#ring)"
    stroke-width="72"
    stroke-linecap="round"
  />
</svg>
